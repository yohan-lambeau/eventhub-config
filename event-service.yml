server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3307/event_db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

info:
  app:
    name: event-service
    description:  An EventHub microservice responsible for managing events
    version: 1.0.0

management:
  endpoints:
    web:
      exposure:
        include: "*"
