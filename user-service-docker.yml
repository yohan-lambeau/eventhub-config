server:
  port: 8082

spring:
  datasource:
    url: jdbc:mysql://mysql:3306/event_db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

info:
  app:
    name: user-service
    description: API Gateway responsible for manage users request
    version: 1.0.0
